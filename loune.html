<!DOCTYPE html>
<html>
<head>
  <title>LOUNE - GRXFIND</title>
  <link rel="stylesheet" href="style.css">
</head>

  <body>

<div class="product-page">

 <div class="product-left">
  <img src="lounejpeg.jpeg" class="main-product-image">
  <img src="lounestoryjpeg.jpeg" class="main-product-image">
  <img src="loune3.jpeg" class="main-product-image">
</div>
    <div class="thumbnail-row">
      <img src="lounejpeg.jpeg" class="thumb active" onclick="changeImage(this)">
      <img src="loune-storyjpeg.jpeg" class="thumb" onclick="changeImage(this)">
    </div>
  </div>

  <div class="product-right">
    <h1 style="color:gold;">LOUNE</h1>

    <p style="font-size:22px;">
      A soft, elegant fragrance with a feminine and luxurious style.
    </p>

    <div style="font-size:48px; color:gold; margin:20px 0;">$79.99</div>
  </div>
</div>

  <script>
function changeImage(img){
  document.getElementById("main-image").src = img.src;

  document.querySelectorAll(".thumb").forEach(item=>{
    item.classList.remove("active");
  });

  img.classList.add("active");
}
</script>

</body>
</html>
